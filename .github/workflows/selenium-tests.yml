name: Run Selenium Tests
on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      # 🔽 НОВЫЙ ШАГ: Распаковать и запустить приложение
      - name: Start F-Bank server
        run: |
          cd dist  # ← теперь эта папка есть в репозитории!
          python3 -m http.server 8000 &
          sleep 5
          curl -f http://localhost:8000/ || exit 1
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --no-cache-dir
      
      - name: Run tests
        run: pytest automated_tests/tests/ -v --html=reports/test_report.html --self-contained-html
        # 🔽 УДАЛИТЕ или закомментируйте эту строку, если она есть:
        # env:
        #   APP_BASE_URL: https://httpbin.org
      
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: ./reports/
